deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B97D185FD7354B2A8F292ED7055449FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E5AC0E0B6BF4B488AA1F891CB90C9A2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89C6AD561B704C9EAD0AAB978DF1D3D5 }}

      - name: Disable Oryx build
        uses: azure/appservice-settings@v1
        with:
          app-name: 'AhmedEduStack'
          app-settings-json: '[{"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false}]'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AhmedEduStack'
          slot-name: 'Production'
          package: .
