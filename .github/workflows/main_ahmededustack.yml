# Docs for the Azure Web Apps Deploy action:
# https://github.com/Azure/webapps-deploy

name: Build and deploy Node.js app to Azure Web App - AhmedEduStack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

     - name: Prepare deployment package
  run: |
    mkdir deploy
    cp -r .next deploy/.next
    cp -r public deploy/public || true
    cp next.config.mjs deploy/next.config.mjs || true
    cp package.json deploy/package.json
    cp package-lock.json deploy/package-lock.json
    cd deploy
    npm ci --omit=dev   # install only production deps inside deploy folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B97D185FD7354B2A8F292ED7055449FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E5AC0E0B6BF4B488AA1F891CB90C9A2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89C6AD561B704C9EAD0AAB978DF1D3D5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AhmedEduStack'
          slot-name: 'Production'
          package: .
